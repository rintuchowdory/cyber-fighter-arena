name: Deploy to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - name: Build
        run: |
          node --version
          npx --no-install vite --version
          NODE_OPTIONS="--max-old-space-size=4096" npx --no-install vite build 2>&1
        env:
          BASE_URL: /cyber-fighter-arena/
          CI: ""
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

