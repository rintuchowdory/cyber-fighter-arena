name: Deploy to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - name: Check install
        run: |
          ls node_modules/.bin/vite || echo "NO VITE BINARY"
          cat node_modules/vite/package.json | python3 -c "import json,sys; p=json.load(sys.stdin); print('vite:', p['version'])" || echo "NO VITE PKG"
          cat node_modules/phaser/package.json | python3 -c "import json,sys; p=json.load(sys.stdin); print('phaser:', p['version'])" || echo "NO PHASER PKG"
      - name: Build
        run: NODE_OPTIONS="--max-old-space-size=4096" node_modules/.bin/vite build
        env:
          BASE_URL: /cyber-fighter-arena/
          CI: ""
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

