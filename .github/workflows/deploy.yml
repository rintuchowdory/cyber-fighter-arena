name: Deploy to GitHub Pages
permissions:
  contents: write
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - run: npm approve-scripts esbuild
      - name: Build
        run: npm run build
        env:
          BASE_URL: /cyber-fighter-arena/
          CI: ""
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
