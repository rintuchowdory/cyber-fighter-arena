name: Deploy to GitHub Pages

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - name: Build and capture errors
        run: |
          NODE_OPTIONS="--max-old-space-size=4096" npx --no-install vite build > /tmp/build.log 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            git config user.email "ci@github.com"
            git config user.name "CI"
            cp /tmp/build.log build-error.log
            git add build-error.log
            git commit -m "ci: capture build error log" || true
            git push origin main || true
            cat /tmp/build.log
            exit $EXIT_CODE
          fi
        env:
          BASE_URL: /cyber-fighter-arena/
          CI: ""
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

